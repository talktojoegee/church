packages:
  - "."

# Hostinger default `pnpm install` — pnpm v11 fails unless builds are approved or strict mode is off.
strictDepBuilds: false
verifyDepsBeforeRun: false
dangerouslyAllowAllBuilds: true

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
