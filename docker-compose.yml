services:
  mysql:
    image: mysql:8.0
    container_name: chms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: chms
      MYSQL_USER: chms
      MYSQL_PASSWORD: chms_password
    ports:
      - "3306:3306"
    volumes:
      - chms_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chms_mysql_data:
