# Local development — MySQL only (API + web run via pnpm dev on the host).
services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: chms_password
      MYSQL_DATABASE: chms
      MYSQL_USER: chms
      MYSQL_PASSWORD: chms_password
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pchms_password"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
