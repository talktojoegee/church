name: chms_mobile
description: ChMS mobile app — Flutter client for the Church Management System API.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  dio_cookie_manager: ^3.1.1
  cookie_jar: ^4.0.8
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5
  provider: ^6.1.2
  go_router: ^14.6.2
  intl: ^0.20.2
  google_fonts: ^6.2.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  image_picker: ^1.1.2
  package_info_plus: ^8.1.2
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
