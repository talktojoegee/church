packages:
  - "apps/*"
  - "packages/*"

# pnpm v11 blocks postinstall scripts unless explicitly allowed.
# dangerouslyAllowAllBuilds is required on Hostinger (auto-install step ignores allowBuilds timing).
dangerouslyAllowAllBuilds: true

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  argon2: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  "@firebase/util": true
  protobufjs: true
