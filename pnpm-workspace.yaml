packages:
  - "api"
  - "web"
  - "e2e"
  - "packages/*"

# Hostinger .builds/ is noexec — skip esbuild postinstall (EACCES).
strictDepBuilds: false

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  argon2: true
  protobufjs: true
  "@firebase/util": true
  esbuild: false
  sharp: false
  unrs-resolver: false
