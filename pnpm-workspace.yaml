packages:
  - "apps/*"
  - "packages/*"

# pnpm v11: allow native/postinstall builds (replaces onlyBuiltDependencies)
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  argon2: true
  esbuild: true
  sharp: true
  unrs-resolver: true
  "@firebase/util": true
  protobufjs: true
