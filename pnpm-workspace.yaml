packages:
  - "apps/*"
  - "packages/*"

# pnpm v11: allowBuilds replaces neverBuiltDependencies (see pnpm.io/settings).
# Hostinger .builds/ is noexec — esbuild postinstall must not run (EACCES).
strictDepBuilds: false

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  prisma: true
  argon2: true
  protobufjs: true
  "@firebase/util": true
  esbuild: false
  sharp: false
  unrs-resolver: false
