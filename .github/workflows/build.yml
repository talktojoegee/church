name: Build for production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.8.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build:prod
        env:
          NEXT_PUBLIC_API_URL: https://api.paggglobal.org/api
          NEXT_PUBLIC_APP_NAME: Power And Glory Generation

      - name: Package deploy bundle
        run: |
          bash scripts/package-hostinger.sh /tmp/chms-hostinger-stage
          tar -czf chms-deploy.tar.gz -C /tmp/chms-hostinger-stage .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chms-deploy
          path: chms-deploy.tar.gz
          retention-days: 7
